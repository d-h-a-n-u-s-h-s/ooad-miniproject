# ============================================================
# ERP Integration Subsystem - Shared RDS Configuration Template
# Give this file to other teams along with the JAR.
# They should copy it into their project and fill in the values.
# ============================================================

# Your live RDS hostname, for example:
# my-erp-db.abcdefghijk.ap-south-1.rds.amazonaws.com
db.host=localhost

# Standard MySQL port on RDS
db.port=3306

# Database created from 01-schema.sql
db.name=erp_subsystem

# Shared application user created on RDS for subsystem access
db.username=erp_admin
db.password=DarshanDiddyOOAD

# HikariCP pool size used by the shared SDK
db.pool.maxSize=10

# Backup/restore paths are mainly for the integration team.
# Other teams usually do not need backup access.
db.backup.dir=backups
db.dump.command=mysqldump
db.restore.command=mysql
